syntax = "proto3";

package ocr.v1;

option go_package = "github.com/seu-usuario/invoices-project/backend-go/gen/ocr/v1;ocrv1";

service OCRService {
  rpc ProcessImage(ImageRequest) returns (OCRResponse);
}

message ImageRequest {
  string id = 1;
  string fileURL = 2;
  string created_date = 3;
  bytes image_data = 4;
}

message ReceiptItem {
  string name = 1;
  int32 quantity = 2;
  double unit_price = 3;
  double total_price = 4;
}

message OCRResponse {
  string id = 1;
  string store_name = 2;
  string cnpj = 3;
  string invoice_date = 4;
  repeated ReceiptItem items = 5;
  double grand_total = 6;
  string processed_at = 7;
  string suggested_category = 8;
}
